<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page - Welcome to the Hellfire Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Metal+Mania&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-logo header-logo-left">
            <img src="header/Titolo - DnD.png" alt="Dungeons & Dragons" class="header-img">
        </div>

        <a href="index.html" class="header-center" aria-label="Torna alla home">
            <img src="header/Titolo.png" class="header-img">
        </a>

        <div class="header-logo header-logo-right">
            <img src="header/Titolo - Netflix.png" alt="Netflix – Stranger Things" class="header-img">
        </div>
    </header>

    <main>
        <div class="cards-grid">

            <!-- LIBRETTI — disponibile -->
            <a href="libretti.html" class="card">
                <img src="icons/libretti.png" alt="Libretti" class="card-icon">
                <div class="card-bg">
                    <span class="card-label">LIBRETTI</span>
                </div>
            </a>

            <!-- CARTE — non disponibile -->
            <button type="button" class="card" onclick="showUnavailable()">
                <img src="icons/carte.png" alt="Carte" class="card-icon">
                <div class="card-bg">
                    <span class="card-label">CARTE</span>
                </div>
            </button>

            <!-- SCHEDE GIOCATORI — non disponibile -->
            <button type="button" class="card" onclick="showUnavailable()">
                <img src="icons/schede_giocatori.png" alt="Schede Giocatori" class="card-icon">
                <div class="card-bg">
                    <span class="card-label">SCHEDE<br>GIOCATORI</span>
                </div>
            </button>

            <!-- SCHERMO MASTER — non disponibile -->
            <button type="button" class="card" onclick="showUnavailable()">
                <img src="icons/schermo_master.webp" alt="Schermo Master" class="card-icon">
                <div class="card-bg">
                    <span class="card-label">SCHERMO<br>MASTER</span>
                </div>
            </button>

        </div>
    </main>

    <!-- Modal "Attualmente non disponibile" -->
    <div class="st-modal" id="stModal" role="dialog" aria-modal="true" aria-label="Contenuto non disponibile" onclick="hideUnavailable()">
        <div class="st-modal-inner">
            <p class="st-modal-label">Attualmente<br>non disponibile</p>
            <p class="st-modal-hint">tocca ovunque per chiudere</p>
        </div>
    </div>

    <script>
        function showUnavailable() {
            document.getElementById('stModal').classList.add('visible');
        }
        function hideUnavailable() {
            document.getElementById('stModal').classList.remove('visible');
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') hideUnavailable();
        });
    </script>

</body>
</html>
