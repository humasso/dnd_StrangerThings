<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sfoglia un PDF come un libro, con zoom, ricerca, testo selezionabile e link cliccabili."
    />
    <title>PDF Book Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="PDF Book Viewer">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 28 28" role="img">
              <path d="M5 5.5C5 4.67 5.67 4 6.5 4H13c1.25 0 2.34.57 3 1.45C16.66 4.57 17.75 4 19 4h2.5c.83 0 1.5.67 1.5 1.5v17c0 .83-.67 1.5-1.5 1.5H19c-1.25 0-2.34.57-3 1.45C15.34 24.57 14.25 24 13 24H6.5C5.67 24 5 23.33 5 22.5v-17Z" />
              <path d="M16 5.45v20M8.5 8H13m-4.5 4H13m5.5-4H21m-2.5 4H21" />
            </svg>
          </span>
          <span class="brand-copy">
            <span class="brand-title">PDF Book Viewer</span>
            <span class="brand-subtitle" id="documentTitle">assets/book.pdf</span>
          </span>
        </div>
      </header>

      <main class="reader-layout">
        <section class="reader-panel" aria-label="Lettore PDF">
          <div class="toolbar" aria-label="Controlli PDF">
            <div class="toolbar-group">
              <button class="icon-button" type="button" id="prevButton" title="Indietro" aria-label="Indietro">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6 9 12l6 6" /></svg>
              </button>
              <label class="page-jump" for="pageInput">
                <input id="pageInput" type="number" min="1" value="1" inputmode="numeric" aria-label="Pagina" />
                <span id="totalPages">/ 0</span>
              </label>
              <button class="icon-button" type="button" id="nextButton" title="Avanti" aria-label="Avanti">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6" /></svg>
              </button>
            </div>

            <div class="toolbar-group zoom-group">
              <button class="icon-button" type="button" id="zoomOutButton" title="Riduci zoom" aria-label="Riduci zoom">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14" /></svg>
              </button>
              <input id="zoomRange" class="zoom-range" type="range" min="75" max="220" step="5" value="100" aria-label="Zoom" />
              <button class="icon-button" type="button" id="zoomInButton" title="Aumenta zoom" aria-label="Aumenta zoom">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
              </button>
              <span class="zoom-value" id="zoomValue">100%</span>
            </div>

            <div class="toolbar-group">
              <button class="icon-button is-active" type="button" id="spreadButton" title="Vista libro" aria-label="Vista libro">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4.75 5.75A2 2 0 0 1 6.75 4H11a2 2 0 0 1 2 2v14a2 2 0 0 0-2-2H6.75a2 2 0 0 0-2 2V5.75ZM19.25 5.75A2 2 0 0 0 17.25 4H13a2 2 0 0 0-2 2v14a2 2 0 0 1 2-2h4.25a2 2 0 0 1 2 2V5.75Z" />
                </svg>
              </button>
            </div>
          </div>

          <div class="book-stage" id="bookStage">
            <div class="empty-state" id="emptyState">
              <div class="empty-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <path d="M14 12h18c4.42 0 8 3.58 8 8v32c0-4.42-3.58-8-8-8H14V12Z" />
                  <path d="M50 12H32c-4.42 0-8 3.58-8 8v32c0-4.42 3.58-8 8-8h18V12Z" />
                  <path d="M20 22h10M20 30h10M38 22h6M38 30h6" />
                </svg>
              </div>
              <p class="empty-title">PDF non disponibile</p>
            </div>
            <div class="spread" id="pageSpread" aria-live="polite"></div>
          </div>

          <div class="statusbar">
            <span id="statusText">Pronto</span>
          </div>
        </section>

        <aside class="search-panel" aria-label="Ricerca nel PDF">
          <div class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m20 20-4.1-4.1m1.1-5.4a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
            </svg>
            <input id="searchInput" type="search" placeholder="Cerca nel PDF" autocomplete="off" />
          </div>
          <div class="search-actions">
            <button class="icon-button" type="button" id="prevResultButton" title="Risultato precedente" aria-label="Risultato precedente">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 14 5-5 5 5" /></svg>
            </button>
            <button class="icon-button" type="button" id="nextResultButton" title="Risultato successivo" aria-label="Risultato successivo">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5" /></svg>
            </button>
            <span id="searchCount" class="search-count">0 risultati</span>
          </div>
          <div class="result-list" id="resultList"></div>
        </aside>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
