<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sfoglia un PDF come un libro, con zoom, ricerca, testo selezionabile e link cliccabili."
    />
    <title>PDF Book Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button home-button" type="button" id="homeButton" title="Torna ai libretti" aria-label="Torna ai libretti" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6 9 12l6 6" /></svg>
        </button>
        <div class="brand-strip" aria-label="Welcome to the Hellfire Club">
          <span class="brand-lockup side-lockup">Dungeons<br />&amp; Dragons</span>
          <span class="hellfire-title">Welcome to the<br /><strong>Hellfire Club</strong></span>
          <span class="brand-lockup side-lockup">Stranger<br />Things</span>
        </div>
        <span class="document-chip" id="documentTitle">Scegli un libretto</span>
      </header>

      <main class="home-screen" id="homeScreen">
        <section class="hellfire-frame" aria-label="Libreria PDF">
          <h1>Libretti</h1>
          <div class="carousel-shell">
            <button class="carousel-nav carousel-prev" type="button" id="carouselPrevButton" title="Libretto precedente" aria-label="Libretto precedente">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6 9 12l6 6" /></svg>
            </button>
            <div class="book-carousel" id="bookCarousel" aria-live="polite"></div>
            <button class="carousel-nav carousel-next" type="button" id="carouselNextButton" title="Libretto successivo" aria-label="Libretto successivo">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6" /></svg>
            </button>
          </div>
          <div class="carousel-dots" id="carouselDots" aria-label="Selezione libretto"></div>
        </section>
      </main>

      <main class="reader-layout" id="readerLayout" hidden>
        <section class="reader-panel" aria-label="Lettore PDF">
          <div class="reader-workspace">
            <div class="tools-wrap" id="toolsWrap">
              <div class="tool-rail" id="toolRail" aria-label="Strumenti lettore">
                <div class="toolbar-group view-group">
                  <button
                    class="icon-button"
                    type="button"
                    id="searchToggleButton"
                    title="Nascondi ricerca"
                    aria-label="Nascondi ricerca"
                    aria-controls="searchPanel"
                    aria-expanded="true"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="m20 20-4.1-4.1m1.1-5.4a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
                    </svg>
                  </button>
                  <button class="icon-button" type="button" id="spreadButton" title="Vista libro" aria-label="Vista libro">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M4.75 5.75A2 2 0 0 1 6.75 4H11a2 2 0 0 1 2 2v14a2 2 0 0 0-2-2H6.75a2 2 0 0 0-2 2V5.75ZM19.25 5.75A2 2 0 0 0 17.25 4H13a2 2 0 0 0-2 2v14a2 2 0 0 1 2-2h4.25a2 2 0 0 1 2 2V5.75Z" />
                    </svg>
                  </button>
                  <button
                    class="icon-button"
                    type="button"
                    id="bookmarkToggleButton"
                    title="Mostra segnalibri"
                    aria-label="Mostra segnalibri"
                    aria-controls="bookmarksPanel"
                    aria-expanded="false"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M7 4.75A1.75 1.75 0 0 1 8.75 3h6.5A1.75 1.75 0 0 1 17 4.75v15.5l-5-3.1-5 3.1V4.75Z" />
                    </svg>
                  </button>
                  <button class="icon-button" type="button" id="addPageBookmarkButton" title="Aggiungi segnalibro" aria-label="Aggiungi segnalibro">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M7 4.75A1.75 1.75 0 0 1 8.75 3h6.5A1.75 1.75 0 0 1 17 4.75v15.5l-5-3.1-5 3.1V4.75Z" />
                      <path d="M12 7.5v5M9.5 10h5" />
                    </svg>
                  </button>
                </div>

                <div class="toolbar-group zoom-group">
                  <button class="icon-button" type="button" id="zoomInButton" title="Aumenta zoom" aria-label="Aumenta zoom">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
                  </button>
                  <input id="zoomRange" class="zoom-range" type="range" min="75" max="220" step="5" value="100" aria-label="Zoom" />
                  <button class="icon-button" type="button" id="zoomOutButton" title="Riduci zoom" aria-label="Riduci zoom">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14" /></svg>
                  </button>
                  <span class="zoom-value" id="zoomValue">100%</span>
                </div>
              </div>

              <button
                class="icon-button tools-toggle-button"
                type="button"
                id="toolsToggleButton"
                title="Nascondi strumenti"
                aria-label="Nascondi strumenti"
                aria-controls="toolRail"
                aria-expanded="true"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6" /></svg>
              </button>
            </div>

            <div class="pdf-column">
              <div class="book-stage" id="bookStage">
                <div class="empty-state" id="emptyState">
                  <div class="empty-icon" aria-hidden="true">
                    <svg viewBox="0 0 64 64">
                      <path d="M14 12h18c4.42 0 8 3.58 8 8v32c0-4.42-3.58-8-8-8H14V12Z" />
                      <path d="M50 12H32c-4.42 0-8 3.58-8 8v32c0-4.42 3.58-8 8-8h18V12Z" />
                      <path d="M20 22h10M20 30h10M38 22h6M38 30h6" />
                    </svg>
                  </div>
                  <p class="empty-title">PDF non disponibile</p>
                </div>
                <div class="spread" id="pageSpread" aria-live="polite"></div>
              </div>

              <div class="toolbar page-toolbar" aria-label="Controlli PDF">
                <div class="toolbar-group page-group">
                  <button class="icon-button" type="button" id="prevButton" title="Indietro" aria-label="Indietro">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6 9 12l6 6" /></svg>
                  </button>
                  <label class="page-jump" for="pageInput">
                    <input id="pageInput" min="1" value="1" inputmode="numeric" aria-label="Pagina" />
                    <span id="totalPages">0</span>
                  </label>
                  <button class="icon-button" type="button" id="nextButton" title="Avanti" aria-label="Avanti">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6" /></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="statusbar">
            <span id="statusText"></span>
          </div>
        </section>

        <aside class="search-panel" id="sidePanel" aria-label="Pannello laterale">
          <section class="panel-view" id="searchPanel" aria-label="Ricerca nel PDF">
            <div class="search-box">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m20 20-4.1-4.1m1.1-5.4a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
              </svg>
              <input id="searchInput" type="search" placeholder="Cerca nel PDF" autocomplete="off" />
            </div>
            <div class="search-actions">
              <button class="icon-button" type="button" id="prevResultButton" title="Risultato precedente" aria-label="Risultato precedente">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 14 5-5 5 5" /></svg>
              </button>
              <button class="icon-button" type="button" id="nextResultButton" title="Risultato successivo" aria-label="Risultato successivo">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 10 5 5 5-5" /></svg>
              </button>
              <span id="searchCount" class="search-count">0 risultati</span>
            </div>
            <div class="result-list" id="resultList"></div>
          </section>

          <section class="panel-view bookmarks-panel" id="bookmarksPanel" aria-label="Segnalibri" hidden>
            <div class="bookmarks-header">
              <h2>Segnalibri</h2>
              <span id="bookmarkCount" class="bookmark-count">0</span>
            </div>
            <div class="bookmark-list" id="bookmarkList"></div>
          </section>
        </aside>
      </main>
    </div>

    <div class="selection-menu" id="selectionMenu" hidden>
      <button type="button" id="selectionBookmarkButton">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 4.75A1.75 1.75 0 0 1 8.75 3h6.5A1.75 1.75 0 0 1 17 4.75v15.5l-5-3.1-5 3.1V4.75Z" />
          <path d="M12 7.5v5M9.5 10h5" />
        </svg>
        <span>Segnalibro</span>
      </button>
    </div>

    <dialog class="bookmark-dialog" id="bookmarkDialog">
      <form class="bookmark-form" id="bookmarkForm">
        <div class="bookmark-dialog-head">
          <h2 id="bookmarkDialogTitle">Nuovo segnalibro</h2>
          <button class="icon-button" type="button" id="bookmarkCancelButton" title="Chiudi" aria-label="Chiudi">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" /></svg>
          </button>
        </div>
        <label class="field-label" for="bookmarkTitleInput">Nome</label>
        <input id="bookmarkTitleInput" class="text-field" type="text" maxlength="90" autocomplete="off" />
        <p class="bookmark-context" id="bookmarkContext"></p>
        <div class="dialog-actions">
          <button class="text-button" type="button" id="bookmarkDismissButton">Annulla</button>
          <button class="text-button text-button-primary" type="submit">Salva</button>
        </div>
      </form>
    </dialog>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
